name: Build Unsigned IPAEditor

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Export IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Unsigned Archive
        run: |
          xcodebuild clean archive \
            -project IPAEditor.xcodeproj \
            -scheme IPAEditor \
            -configuration Release \
            -archivePath $(pwd)/build/IPAEditor.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Create IPA Payload
        run: |
          mkdir -p Payload
          cp -R build/IPAEditor.xcarchive/Products/Applications/IPAEditor.app Payload/
          zip -r IPAEditor.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPAEditor-Unsigned
          path: IPAEditor.ipa
